<h1>年</h1>

<div class="poem">

《年》…………

年復一年，异乡风麈，愿歸仍是一少年。
一願初心，切念多年，此心安处是無言。
歸去來兮，田園一無，時莭將至知清明。
七世团圓，心香獨祭，錢湖月影现故人。
過心年……
